<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GST Calculator - Prime Tools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }

    header {
      background: #1a1a2e;
      color: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header a {
      color: #00d4aa;
      text-decoration: none;
      font-size: 14px;
    }
    header h1 { font-size: 20px; color: #00d4aa; }

    .page-title {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: white;
      text-align: center;
      padding: 36px 20px;
    }
    .page-title h2 { font-size: 28px; margin-bottom: 8px; }
    .page-title p { color: #aaa; font-size: 14px; }

    .calculator-box {
      max-width: 540px;
      margin: 36px auto;
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
    }
    .field input, .field select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus {
      border-color: #00d4aa;
    }

    .gst-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .gst-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 60px;
    }
    .gst-btn:hover { border-color: #00d4aa; color: #00d4aa; }
    .gst-btn.active { background: #00d4aa; border-color: #00d4aa; color: white; }

    .calc-button {
      width: 100%;
      padding: 14px;
      background: #00d4aa;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 24px;
    }
    .calc-button:hover { background: #00b894; }

    .result-box {
      background: #f8fffe;
      border: 2px solid #00d4aa;
      border-radius: 12px;
      padding: 20px;
      display: none;
    }
    .result-box.show { display: block; }

    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e8f8f5;
      font-size: 15px;
    }
    .result-row:last-child { border-bottom: none; }
    .result-row .label { color: #666; }
    .result-row .value { font-weight: 600; color: #1a1a2e; }
    .result-row.total .label { color: #1a1a2e; font-weight: 700; font-size: 16px; }
    .result-row.total .value { color: #00d4aa; font-size: 18px; font-weight: 700; }

    .type-toggle {
      display: flex;
      background: #f0f4f8;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 20px;
      gap: 4px;
    }
    .type-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: transparent;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #888;
      transition: all 0.2s;
    }
    .type-btn.active { background: white; color: #1a1a2e; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

    footer {
      text-align: center;
      padding: 24px;
      background: #1a1a2e;
      color: #aaa;
      font-size: 13px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html">← Back to Home</a>
    <h1>Prime Tools</h1>
  </header>

  <div class="page-title">
    <h2>GST Calculator</h2>
    <p>Calculate GST amount instantly — add or remove GST from any amount</p>
  </div>

  <div class="calculator-box">

    <div class="type-toggle">
      <button class="type-btn active" onclick="setType('add')">Add GST to amount</button>
      <button class="type-btn" onclick="setType('remove')">Remove GST from amount</button>
    </div>

    <div class="field">
      <label>Enter Amount (₹)</label>
      <input type="number" id="amount" placeholder="e.g. 10000" oninput="calculate()">
    </div>

    <div class="field">
      <label>Select GST Rate</label>
      <div class="gst-buttons">
        <button class="gst-btn active" onclick="setGST(this, 5)">5%</button>
        <button class="gst-btn" onclick="setGST(this, 12)">12%</button>
        <button class="gst-btn" onclick="setGST(this, 18)">18%</button>
        <button class="gst-btn" onclick="setGST(this, 28)">28%</button>
      </div>
    </div>

    <button class="calc-button" onclick="calculate()">Calculate GST</button>

    <div class="result-box" id="resultBox">
      <div class="result-row">
        <span class="label">Original Amount</span>
        <span class="value" id="r-original">₹0</span>
      </div>
      <div class="result-row">
        <span class="label">GST Rate</span>
        <span class="value" id="r-rate">0%</span>
      </div>
      <div class="result-row">
        <span class="label">CGST (<span id="r-cgst-pct">0</span>%)</span>
        <span class="value" id="r-cgst">₹0</span>
      </div>
      <div class="result-row">
        <span class="label">SGST (<span id="r-sgst-pct">0</span>%)</span>
        <span class="value" id="r-sgst">₹0</span>
      </div>
      <div class="result-row total">
        <span class="label" id="r-total-label">Total Amount (with GST)</span>
        <span class="value" id="r-total">₹0</span>
      </div>
    </div>

  </div>

  <footer>
    <p>© 2026 Prime Tools — primetoolsapp.com | Free tools for everyone</p>
  </footer>

  <script>
    let gstRate = 5;
    let calcType = 'add';

    function setGST(btn, rate) {
      document.querySelectorAll('.gst-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      gstRate = rate;
      calculate();
    }

    function setType(type) {
      calcType = type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('r-total-label').textContent =
        type === 'add' ? 'Total Amount (with GST)' : 'Original Amount (without GST)';
      calculate();
    }

    function calculate() {
      const amount = parseFloat(document.getElementById('amount').value);
      if (!amount || amount <= 0) {
        document.getElementById('resultBox').classList.remove('show');
        return;
      }

      let gstAmount, totalAmount, baseAmount;

      if (calcType === 'add') {
        baseAmount = amount;
        gstAmount = (amount * gstRate) / 100;
        totalAmount = amount + gstAmount;
      } else {
        totalAmount = amount;
        baseAmount = (amount * 100) / (100 + gstRate);
        gstAmount = amount - baseAmount;
      }

      const half = gstRate / 2;

      document.getElementById('r-original').textContent = '₹' + baseAmount.toFixed(2);
      document.getElementById('r-rate').textContent = gstRate + '%';
      document.getElementById('r-cgst-pct').textContent = half;
      document.getElementById('r-sgst-pct').textContent = half;
      document.getElementById('r-cgst').textContent = '₹' + (gstAmount / 2).toFixed(2);
      document.getElementById('r-sgst').textContent = '₹' + (gstAmount / 2).toFixed(2);
      document.getElementById('r-total').textContent = '₹' + totalAmount.toFixed(2);

      document.getElementById('resultBox').classList.add('show');
    }
  </script>

</body>
</html>
