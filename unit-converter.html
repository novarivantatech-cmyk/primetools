  <meta charset="UTF-8">

  <title>Unit Converter - Prime Tools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }

    header {
      background: #1a1a2e; color: white;
      padding: 16px 32px;
      display: flex; align-items: center; gap: 16px;
    }
    header a { color: #00d4aa; text-decoration: none; font-size: 14px; }
    header h1 { font-size: 20px; color: #00d4aa; }

    .page-title {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: white; text-align: center; padding: 36px 20px;
    }
    .page-title h2 { font-size: 28px; margin-bottom: 8px; }
    .page-title p { color: #aaa; font-size: 14px; }

    .calculator-box {
      max-width: 640px; margin: 36px auto;
      background: white; border-radius: 16px;
      padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    /* Category tabs */
    .category-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 8px; margin-bottom: 28px;
    }
    .cat-btn {
      padding: 10px 6px; border: 2px solid #e0e0e0;
      border-radius: 10px; background: white;
      font-size: 12px; font-weight: 600; cursor: pointer;
      color: #888; transition: all 0.2s; text-align: center;
    }
    .cat-btn .cat-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    .cat-btn:hover { border-color: #00d4aa; color: #00d4aa; }
    .cat-btn.active {
      border-color: #00d4aa; background: #e8fdf8; color: #00d4aa;
    }

    /* Converter area */
    .converter-area {
      background: #f8fffe; border: 2px solid #e0f7f3;
      border-radius: 12px; padding: 24px; margin-bottom: 20px;
    }

    .conv-row {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 12px; align-items: end; margin-bottom: 16px;
    }
    .conv-field label {
      display: block; font-size: 13px; font-weight: 600;
      color: #555; margin-bottom: 8px;
    }
    .conv-field input {
      width: 100%; padding: 14px 16px;
      border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 20px; font-weight: 700; outline: none;
      transition: border-color 0.2s; color: #1a1a2e;
    }
    .conv-field input:focus { border-color: #00d4aa; }
    .conv-field select {
      width: 100%; padding: 10px 14px;
      border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 14px; outline: none; cursor: pointer;
      background: white; margin-top: 8px;
    }
    .conv-field select:focus { border-color: #00d4aa; }

    .swap-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: #00d4aa; border: none; cursor: pointer;
      font-size: 20px; color: white;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s; margin-bottom: 2px; flex-shrink: 0;
    }
    .swap-btn:hover { background: #00b894; transform: rotate(180deg); }

    .result-banner {
      background: #1a1a2e; color: white;
      border-radius: 10px; padding: 16px 20px;
      text-align: center; font-size: 15px;
    }
    .result-banner strong { color: #00d4aa; font-size: 18px; }

    /* All conversions table */
    .all-title {
      font-size: 14px; font-weight: 600; color: #555;
      margin-bottom: 12px;
    }
    .all-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    .all-table th {
      background: #1a1a2e; color: white;
      padding: 9px 12px; text-align: left;
    }
    .all-table th:last-child { text-align: right; }
    .all-table td {
      padding: 9px 12px; border-bottom: 1px solid #f0f0f0; color: #444;
    }
    .all-table td:last-child { text-align: right; font-weight: 600; color: #1a1a2e; }
    .all-table tr.highlight td { background: #e8fdf8; }
    .all-table tr:hover td { background: #f8fffe; }

    footer {
      text-align: center; padding: 24px;
      background: #1a1a2e; color: #aaa;
      font-size: 13px; margin-top: 40px;
    }
  </style>

<body>

<header>
  <a href="index.html">← Back to Home</a>
  <h1>Prime Tools</h1>
</header>

<div class="page-title">
  <h2>Unit Converter</h2>
  <p>Convert length, weight, temperature, area, volume, speed and more</p>
</div>

<div class="calculator-box">

  <div class="category-grid">
    <button class="cat-btn active" onclick="setCategory('length', this)">
      <span class="cat-icon">📏</span>Length
    </button>
    <button class="cat-btn" onclick="setCategory('weight', this)">
      <span class="cat-icon">⚖️</span>Weight
    </button>
    <button class="cat-btn" onclick="setCategory('temperature', this)">
      <span class="cat-icon">🌡️</span>Temp
    </button>
    <button class="cat-btn" onclick="setCategory('area', this)">
      <span class="cat-icon">📐</span>Area
    </button>
    <button class="cat-btn" onclick="setCategory('volume', this)">
      <span class="cat-icon">🧪</span>Volume
    </button>
    <button class="cat-btn" onclick="setCategory('speed', this)">
      <span class="cat-icon">💨</span>Speed
    </button>
    <button class="cat-btn" onclick="setCategory('data', this)">
      <span class="cat-icon">💾</span>Data
    </button>
    <button class="cat-btn" onclick="setCategory('time', this)">
      <span class="cat-icon">⏱️</span>Time
    </button>
  </div>

  <div class="converter-area">
    <div class="conv-row">
      <div class="conv-field">
        <label>From</label>
        <input type="number" id="fromVal" value="1" oninput="convert()">
        <select id="fromUnit" onchange="convert()"></select>
      </div>
      <button class="swap-btn" onclick="swapUnits()">⇄</button>
      <div class="conv-field">
        <label>To</label>
        <input type="number" id="toVal" readonly style="background:#f0fdf8;cursor:default;">
        <select id="toUnit" onchange="convert()"></select>
      </div>
    </div>
    <div class="result-banner" id="resultBanner">
      Enter a value to convert
    </div>
  </div>

  <div class="all-title">All conversions for <span id="allTitle">1</span> <span id="allUnit"></span></div>
  <table class="all-table">
    <thead><tr><th>Unit</th><th>Value</th></tr></thead>
    <tbody id="allBody"></tbody>
  </table>

</div>

<footer>
  <p>© 2026 Prime Tools — primetoolsapp.com | Free tools for everyone</p>
</footer>

<script>
  const categories = {
    length: {
      units: ['Millimeter (mm)', 'Centimeter (cm)', 'Meter (m)', 'Kilometer (km)',
               'Inch (in)', 'Foot (ft)', 'Yard (yd)', 'Mile (mi)'],
      toBase: [0.001, 0.01, 1, 1000, 0.0254, 0.3048, 0.9144, 1609.344],
      defaults: [2, 3]
    },
    weight: {
      units: ['Milligram (mg)', 'Gram (g)', 'Kilogram (kg)', 'Metric Ton (t)',
               'Ounce (oz)', 'Pound (lb)', 'Stone (st)'],
      toBase: [0.000001, 0.001, 1, 1000, 0.0283495, 0.453592, 6.35029],
      defaults: [2, 5]
    },
    temperature: {
      units: ['Celsius (°C)', 'Fahrenheit (°F)', 'Kelvin (K)'],
      toBase: null,
      defaults: [0, 1]
    },
    area: {
      units: ['sq mm (mm²)', 'sq cm (cm²)', 'sq meter (m²)', 'sq km (km²)',
               'sq inch (in²)', 'sq foot (ft²)', 'Acre', 'Hectare'],
      toBase: [0.000001, 0.0001, 1, 1000000, 0.00064516, 0.092903, 4046.86, 10000],
      defaults: [2, 6]
    },
    volume: {
      units: ['Milliliter (ml)', 'Liter (L)', 'Cubic meter (m³)',
               'Teaspoon (tsp)', 'Tablespoon (tbsp)', 'Cup', 'Pint (pt)', 'Gallon (gal)'],
      toBase: [0.001, 1, 1000, 0.00492892, 0.0147868, 0.24, 0.473176, 3.78541],
      defaults: [1, 7]
    },
    speed: {
      units: ['m/s', 'km/h', 'mph', 'Knots', 'ft/s'],
      toBase: [1, 0.277778, 0.44704, 0.514444, 0.3048],
      defaults: [1, 2]
    },
    data: {
      units: ['Bit', 'Byte (B)', 'Kilobyte (KB)', 'Megabyte (MB)',
               'Gigabyte (GB)', 'Terabyte (TB)', 'Petabyte (PB)'],
      toBase: [0.125, 1, 1024, 1048576, 1073741824, 1099511627776, 1125899906842624],
      defaults: [3, 4]
    },
    time: {
      units: ['Millisecond (ms)', 'Second (s)', 'Minute (min)',
               'Hour (hr)', 'Day', 'Week', 'Month (30d)', 'Year (365d)'],
      toBase: [0.001, 1, 60, 3600, 86400, 604800, 2592000, 31536000],
      defaults: [2, 3]
    }
  };

  let currentCategory = 'length';

  function setCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    populateUnits();
    convert();
  }

  function populateUnits() {
    const cat = categories[currentCategory];
    const from = document.getElementById('fromUnit');
    const to   = document.getElementById('toUnit');
    from.innerHTML = '';
    to.innerHTML   = '';
    cat.units.forEach((u, i) => {
      from.innerHTML += `<option value="${i}">${u}</option>`;
      to.innerHTML   += `<option value="${i}">${u}</option>`;
    });
    from.value = cat.defaults[0];
    to.value   = cat.defaults[1];
    document.getElementById('fromVal').value = 1;
  }

  function convertTemp(val, fromIdx, toIdx) {
    let celsius;
    if (fromIdx === 0) celsius = val;
    else if (fromIdx === 1) celsius = (val - 32) * 5/9;
    else celsius = val - 273.15;

    if (toIdx === 0) return celsius;
    if (toIdx === 1) return celsius * 9/5 + 32;
    return celsius + 273.15;
  }

  function fmtResult(n) {
    if (Math.abs(n) >= 1e9 || (Math.abs(n) < 0.0001 && n !== 0)) {
      return n.toExponential(4);
    }
    return parseFloat(n.toFixed(6)).toString();
  }

  function convert() {
    const cat    = categories[currentCategory];
    const val    = parseFloat(document.getElementById('fromVal').value);
    const fromI  = parseInt(document.getElementById('fromUnit').value);
    const toI    = parseInt(document.getElementById('toUnit').value);
    const fromU  = cat.units[fromI];
    const toU    = cat.units[toI];

    if (isNaN(val)) return;

    let result;
    if (currentCategory === 'temperature') {
      result = convertTemp(val, fromI, toI);
    } else {
      const base = val * cat.toBase[fromI];
      result = base / cat.toBase[toI];
    }

    document.getElementById('toVal').value = fmtResult(result);
    document.getElementById('resultBanner').innerHTML =
      `<strong>${val} ${fromU}</strong> = <strong>${fmtResult(result)} ${toU}</strong>`;
    document.getElementById('allTitle').textContent = val;
    document.getElementById('allUnit').textContent  = fromU;

    let allHTML = '';
    cat.units.forEach((u, i) => {
      let r;
      if (currentCategory === 'temperature') {
        r = convertTemp(val, fromI, i);
      } else {
        r = (val * cat.toBase[fromI]) / cat.toBase[i];
      }
      allHTML += `<tr class="${i === toI ? 'highlight' : ''}">
        <td>${u}</td>
        <td>${fmtResult(r)}</td>
      </tr>`;
    });
    document.getElementById('allBody').innerHTML = allHTML;
  }

  function swapUnits() {
    const from = document.getElementById('fromUnit');
    const to   = document.getElementById('toUnit');
    const fromVal = document.getElementById('fromVal');
    const toVal   = document.getElementById('toVal');
    const tmp = from.value;
    from.value = to.value;
    to.value = tmp;
    fromVal.value = parseFloat(toVal.value) || 1;
    convert();
  }

  // Init
  populateUnits();
  convert();
</script>

</body>
</html>
