  function setGender(gender) {
    currentGender = gender;
    document.querySelectorAll('.gender-tab').forEach(t => t.classList.remove('active'));
    event.target.closest('.gender-tab').classList.add('active');
  }

  function onStateChange() {
    const state = document.getElementById('stateSelect').value;
    const info = document.getElementById('stateInfo');
    if (!state) { info.textContent = ''; return; }
    const data = ptData[state];
    if (data.noPT) {
      info.textContent = data.name + ' does NOT levy Professional Tax. No deduction from salary.';
      info.style.color = '#ff6b6b';
    } else {
      info.textContent = data.name + ' levies PT ' + data.freq.toLowerCase() + '. Max annual cap: Rs.2,500.';
      info.style.color = '#00a878';
    }
  }

  function calculatePT() {
    const stateKey = document.getElementById('stateSelect').value;
    const salary = parseFloat(document.getElementById('salary').value) || 0;
    const age = parseInt(document.getElementById('age').value) || 0;

    if (!stateKey) { alert('Please select your state.'); return; }
    if (salary <= 0) { alert('Please enter a valid monthly salary.'); return; }

    const data = ptData[stateKey];

    if (data.noPT) {
      showNoPT(data, salary);
      return;
    }

    if (age >= 65) {
      showSeniorExempt(data, salary);
      return;
    }

    const slabs = data.slabs[currentGender];
    let applicableSlab = slabs.find(s => salary >= s.min && salary <= s.max);
    if (!applicableSlab) applicableSlab = slabs[slabs.length - 1];

    const monthlyPT = applicableSlab.amount;
    let annualPT;
    if (data.freq === 'Half-Yearly') {
      annualPT = monthlyPT * 2;
    } else if (stateKey === 'maharashtra') {
      annualPT = (monthlyPT * 11) + 300;
    } else if (stateKey === 'karnataka') {
      annualPT = (monthlyPT * 11) + 300;
    } else if (stateKey === 'madhyapradesh') {
      annualPT = (monthlyPT * 11) + 212;
    } else {
      annualPT = monthlyPT * 12;
    }

    annualPT = Math.min(annualPT, 2500);
    const taxSaving = Math.round(annualPT * 0.312);
    const effectiveCost = annualPT - taxSaving;

    document.getElementById('resMonthlyPT').textContent = 'Rs.' + monthlyPT.toLocaleString('en-IN');
    document.getElementById('resMonthlyPT').style.color = monthlyPT > 0 ? '#00d4aa' : '#ff6b6b';
    document.getElementById('resStateName').textContent = data.name + ' -- ' + data.freq + ' PT';
    document.getElementById('resAnnualPT').textContent = 'Rs.' + annualPT.toLocaleString('en-IN');
    document.getElementById('resTaxSaving').textContent = 'Rs.' + taxSaving.toLocaleString('en-IN');
    document.getElementById('resEffective').textContent = 'Rs.' + effectiveCost.toLocaleString('en-IN');

    document.getElementById('sumState').textContent = data.name;
    document.getElementById('sumSalary').textContent = 'Rs.' + salary.toLocaleString('en-IN') + '/month';
    document.getElementById('sumSlab').textContent = applicableSlab.label;
    document.getElementById('sumRate').textContent = 'Rs.' + monthlyPT + '/month';
    document.getElementById('sumSpecial').textContent = data.special;
    document.getElementById('sumMonthly').textContent = 'Rs.' + monthlyPT.toLocaleString('en-IN');
    document.getElementById('sumAnnual').textContent = 'Rs.' + annualPT.toLocaleString('en-IN');

    const tbody = document.getElementById('slabBody');
    tbody.innerHTML = '';
    slabs.forEach(slab => {
      const row = document.createElement('tr');
      if (slab === applicableSlab) row.classList.add('active-slab');
      row.innerHTML = '<td>' + slab.label + '</td><td style="text-align:right;">Rs.' + slab.amount + '</td>';
      tbody.appendChild(row);
    });

    document.getElementById('exemptionBox').style.display = 'block';
    document.getElementById('exemptionList').innerHTML = data.exemptions.map(e => '<li>' + e + '</li>').join('');
    document.getElementById('resultBox').classList.add('show');
    document.getElementById('comparisonWrap').classList.remove('show');
  }

  function showNoPT(data, salary) {
    document.getElementById('resMonthlyPT').textContent = 'Rs.0';
    document.getElementById('resMonthlyPT').style.color = '#00d4aa';
    document.getElementById('resStateName').textContent = data.name + ' -- No PT Levied';

    document.getElementById('resEffective').textContent = 'Rs.0';
    document.getElementById('sumState').textContent = data.name;

    document.getElementById('sumRate').textContent = 'No PT';

    document.getElementById('slabBody').innerHTML = '';
    document.getElementById('exemptionBox').style.display = 'none';
    document.getElementById('resultBox').classList.add('show');
  }

    document.getElementById('exemptionBox').style.display = 'block';
    document.getElementById('exemptionList').innerHTML = '<li>Senior citizens (65+) are exempt from Professional Tax in all states</li>';
    document.getElementById('resultBox').classList.add('show');
  }
